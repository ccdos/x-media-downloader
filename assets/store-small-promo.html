<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      body { margin:0; width:440px; height:280px; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:linear-gradient(135deg,#020617,#111827 55%,#1d4ed8); color:#e2e8f0; }
      .wrap { padding:24px; height:100%; box-sizing:border-box; display:flex; flex-direction:column; justify-content:space-between; }
      h1 { margin:0; font-size:34px; line-height:1.02; }
      p { margin:10px 0 0; color:#cbd5e1; font-size:16px; }
      .badge { display:inline-flex; align-items:center; gap:10px; padding:10px 14px; border-radius:999px; background:rgba(15,23,42,.6); border:1px solid rgba(148,163,184,.18); width:max-content; }
      .icon { width:34px; height:34px; border-radius:12px; background:linear-gradient(135deg,#38bdf8,#22c55e); display:grid; place-items:center; color:#082f49; font-weight:900; }
      .chips { display:flex; gap:10px; flex-wrap:wrap; }
      .chip { font-size:13px; color:#7dd3fc; border:1px solid rgba(125,211,252,.24); padding:8px 10px; border-radius:999px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge"><div class="icon">↓</div><strong>X Media Downloader</strong></div>
      <div>
        <h1>Download post media in one click.</h1>
        <p>Images, videos, readable filenames, and no button on empty posts.</p>
      </div>
      <div class="chips"><div class="chip">X / Twitter</div><div class="chip">Manifest V3</div><div class="chip">Template filenames</div></div>
    </div>
  </body>
</html>
